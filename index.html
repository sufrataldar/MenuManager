<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>سفرة الدار | إدارة المنيو</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="apple-touch-icon" href="https://iili.io/fj31YHN.md.png">
    <link rel="icon" href="https://iili.io/fj31YHN.md.png">
<style>
:root {
    --primary: #ff6600;
    --dark: #121212;
    --card: #1e1e1e;
    --card2: #252525;
    --text: #ffffff;
    --muted: #888;
    --border: #333;
    --success: #00c851;
    --danger: #ff4444;
    --info: #33b5e5;
    --warning: #ffbb33;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
}

/* ===== HEADER ===== */
.header {
    background: rgba(18,18,18,0.97);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: 800; }
.logo img { height: 42px; width: 42px; border-radius: 50%; border: 2px solid var(--primary); object-fit: cover; }
.header-actions { display: flex; gap: 10px; align-items: center; }

/* ===== LAYOUT ===== */
.layout { display: flex; min-height: calc(100vh - 65px); }

/* ===== SIDEBAR ===== */
.sidebar {
    width: 230px;
    background: var(--card);
    border-left: 1px solid var(--border);
    padding: 20px 0;
    flex-shrink: 0;
    position: sticky;
    top: 65px;
    height: calc(100vh - 65px);
    overflow-y: auto;
}
.sidebar-title {
    padding: 0 15px 15px;
    font-size: 0.75rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
}
.cat-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 15px;
    cursor: pointer;
    transition: 0.2s;
    border-right: 3px solid transparent;
    font-size: 0.9rem;
}
.cat-item:hover { background: rgba(255,102,0,0.08); }
.cat-item.active {
    background: rgba(255,102,0,0.12);
    border-right-color: var(--primary);
    color: var(--primary);
    font-weight: 600;
}
.cat-count {
    background: var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 2px 8px;
    font-size: 0.75rem;
    min-width: 26px;
    text-align: center;
}
.cat-item.active .cat-count { background: var(--primary); color: #000; }

.sidebar-actions {
    padding: 15px;
    border-top: 1px solid var(--border);
    margin-top: auto;
}

/* ===== MAIN ===== */
.main { flex: 1; padding: 20px; overflow-x: hidden; }

/* ===== STATS ===== */
.stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 15px;
    margin-bottom: 25px;
}
.stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    align-items: center;
    gap: 14px;
}
.stat-icon {
    width: 44px; height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
}
.stat-icon.orange { background: rgba(255,102,0,0.15); color: var(--primary); }
.stat-icon.green  { background: rgba(0,200,81,0.15);  color: var(--success); }
.stat-icon.red    { background: rgba(255,68,68,0.15);  color: var(--danger); }
.stat-icon.blue   { background: rgba(51,181,229,0.15); color: var(--info); }
.stat-value { font-size: 1.5rem; font-weight: 800; }
.stat-label { font-size: 0.8rem; color: var(--muted); }

/* ===== TOOLBAR ===== */
.toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    gap: 12px;
    flex-wrap: wrap;
}
.toolbar-right { display: flex; gap: 10px; align-items: center; }
.search-box {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    gap: 10px;
    min-width: 220px;
    transition: border-color 0.2s;
}
.search-box:focus-within { border-color: var(--primary); }
.search-box i { color: var(--muted); font-size: 0.9rem; }
.search-box input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Cairo';
    padding: 11px 0;
    font-size: 0.9rem;
    width: 100%;
}
.filter-select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Cairo';
    font-size: 0.9rem;
    outline: none;
    cursor: pointer;
}
.filter-select:focus { border-color: var(--primary); }

/* ===== BUTTONS ===== */
.btn {
    padding: 10px 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Cairo';
    font-weight: 700;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: 0.2s;
    white-space: nowrap;
}
.btn-primary { background: var(--primary); color: #000; }
.btn-primary:hover { background: #ff8c00; transform: translateY(-1px); }
.btn-success { background: var(--success); color: #000; }
.btn-success:hover { background: #00a842; transform: translateY(-1px); }
.btn-danger  { background: var(--danger);  color: #fff; }
.btn-danger:hover  { background: #cc0000; transform: translateY(-1px); }
.btn-info    { background: var(--info);    color: #000; }
.btn-info:hover { background: #1a9dc7; transform: translateY(-1px); }
.btn-outline {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
}
.btn-outline:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 7px 12px; font-size: 0.82rem; border-radius: 7px; }
.btn-icon {
    width: 34px; height: 34px;
    padding: 0;
    border-radius: 7px;
    justify-content: center;
    font-size: 0.9rem;
}

/* ===== ITEMS GRID ===== */
.items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
}
.item-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    transition: 0.2s;
    position: relative;
    overflow: hidden;
}
.item-card:hover { border-color: #444; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
.item-card.unavailable { opacity: 0.55; }
.item-card.unavailable::after {
    content: 'غير متاح';
    position: absolute;
    top: 12px;
    left: 12px;
    background: var(--danger);
    color: #fff;
    font-size: 0.72rem;
    padding: 3px 9px;
    border-radius: 20px;
    font-weight: 700;
}

.item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 10px; }
.item-name { font-size: 0.95rem; font-weight: 700; line-height: 1.4; flex: 1; }
.item-category-tag {
    background: rgba(255,102,0,0.12);
    color: var(--primary);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
}
.item-price {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 14px;
}
.item-actions { display: flex; gap: 7px; }

/* ===== AVAILABILITY TOGGLE ===== */
.avail-toggle {
    position: relative;
    width: 42px;
    height: 22px;
    flex-shrink: 0;
}
.avail-toggle input { opacity: 0; width: 0; height: 0; }
.avail-slider {
    position: absolute;
    inset: 0;
    background: #333;
    border-radius: 22px;
    cursor: pointer;
    transition: 0.3s;
}
.avail-slider::before {
    content: '';
    position: absolute;
    height: 16px;
    width: 16px;
    right: 3px;
    top: 3px;
    background: var(--muted);
    border-radius: 50%;
    transition: 0.3s;
}
.avail-toggle input:checked + .avail-slider { background: rgba(0,200,81,0.25); }
.avail-toggle input:checked + .avail-slider::before {
    transform: translateX(-20px);
    background: var(--success);
}

/* ===== MODAL ===== */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
    background: var(--card);
    border: 1px solid #3a3a3a;
    border-radius: 18px;
    width: 100%;
    max-width: 480px;
    padding: 28px;
    animation: modalIn 0.25s ease;
    max-height: 90vh;
    overflow-y: auto;
}
@keyframes modalIn {
    from { opacity: 0; transform: translateY(20px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0)  scale(1); }
}
.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 1.2rem; font-weight: 800; color: var(--primary); display: flex; align-items: center; gap: 10px; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; padding: 5px; border-radius: 6px; transition: 0.2s; }
.modal-close:hover { color: var(--text); background: var(--border); }

/* ===== FORM ===== */
.form-group { margin-bottom: 18px; }
.form-label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #ccc; font-weight: 600; }
.form-label span { color: var(--danger); margin-right: 2px; }
.form-control {
    width: 100%;
    padding: 13px 15px;
    background: #1a1a1a;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Cairo';
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
}
.form-control:focus { border-color: var(--primary); }
.form-control.error { border-color: var(--danger); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-hint { font-size: 0.8rem; color: var(--muted); margin-top: 5px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--border); }

/* ===== EMPTY STATE ===== */
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
}
.empty-state i { font-size: 3rem; opacity: 0.3; margin-bottom: 16px; color: var(--primary); }
.empty-state p { font-size: 1rem; margin-bottom: 20px; }

/* ===== SECTION HEADER ===== */
.section-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
}
.section-title { font-size: 1.2rem; font-weight: 800; }
.section-badge {
    background: var(--primary);
    color: #000;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 700;
}

/* ===== LOADING ===== */
.loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(18,18,18,0.85);
    z-index: 999;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(4px);
}
.loading-overlay.show { display: flex; }
.spinner {
    width: 44px; height: 44px;
    border: 3px solid #333;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== TOAST ===== */
.toast-container {
    position: fixed;
    top: 80px;
    left: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}
.toast {
    background: var(--card2);
    border-radius: 10px;
    padding: 13px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 0.9rem;
    border-right: 4px solid var(--primary);
    animation: toastIn 0.3s ease;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    min-width: 260px;
    pointer-events: auto;
}
.toast.success { border-right-color: var(--success); }
.toast.error   { border-right-color: var(--danger); }
.toast.info    { border-right-color: var(--info); }
@keyframes toastIn {
    from { opacity:0; transform: translateX(-20px); }
    to   { opacity:1; transform: translateX(0); }
}

/* ===== CATEGORY SECTION ===== */
.cat-section { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
.cat-section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    transition: 0.2s;
}
.cat-section-header:hover { background: rgba(255,102,0,0.05); }
.cat-section-title { font-weight: 700; font-size: 1rem; display: flex; align-items: center; gap: 10px; }
.cat-section-body { padding: 0 18px 18px; display: none; }
.cat-section-body.open { display: block; }

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .sidebar { display: none; }
    .stats-row { grid-template-columns: 1fr 1fr; }
}
@media (max-width: 600px) {
    .stats-row { grid-template-columns: 1fr; }
    .items-grid { grid-template-columns: 1fr; }
    .form-row { grid-template-columns: 1fr; }
    .toolbar { flex-direction: column; align-items: stretch; }
    .toolbar-right { flex-wrap: wrap; }
    .search-box { min-width: unset; }
}

/* ===== IMPORT SECTION ===== */
.import-box {
    background: var(--card2);
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    transition: 0.2s;
}
.import-box:hover { border-color: var(--primary); }

/* ===== VIEW TOGGLE ===== */
.view-btns { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.view-btn { padding: 8px 12px; background: none; border: none; color: var(--muted); cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
.view-btn.active { background: var(--primary); color: #000; }

/* ===== TABLE VIEW ===== */
.items-table { width: 100%; border-collapse: collapse; }
.items-table th {
    background: var(--card2);
    padding: 12px 14px;
    text-align: right;
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 1px solid var(--border);
}
.items-table td {
    padding: 13px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.9rem;
    vertical-align: middle;
}
.items-table tr:hover td { background: rgba(255,255,255,0.02); }
.items-table .name-cell { font-weight: 600; }
.items-table .price-cell { color: var(--primary); font-weight: 700; }
</style>
</head>
<body>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div style="color:var(--muted); font-size:0.9rem;">جاري التحميل...</div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toast-container"></div>

<!-- Header -->
<div class="header">
    <div class="logo">
        <img src="https://iili.io/fj31YHN.md.png" alt="Logo">
        <div>
            <div>سفرة الدار</div>
            <div style="font-size:0.7rem; color:var(--muted); font-weight:400;">لوحة إدارة المنيو</div>
        </div>
    </div>
    <div class="header-actions">
        <button class="btn btn-outline btn-sm" onclick="loadMenu()">
            <i class="fas fa-sync-alt"></i> تحديث
        </button>
        <button class="btn btn-outline btn-sm" onclick="openModal('import-modal')">
            <i class="fas fa-file-import"></i> استيراد جماعي
        </button>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">
            <i class="fas fa-plus"></i> صنف جديد
        </button>
    </div>
</div>

<div class="layout">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-title">الفئات</div>
        <div id="sidebar-cats">
            <div class="cat-item active" onclick="filterCategory('all')" id="cat-all">
                <span><i class="fas fa-th-large" style="margin-left:8px; color:var(--primary)"></i>جميع الأصناف</span>
                <span class="cat-count" id="count-all">0</span>
            </div>
        </div>
        <div class="sidebar-actions">
            <button class="btn btn-outline" style="width:100%; justify-content:center;" onclick="openCategoryModal()">
                <i class="fas fa-folder-plus"></i> فئة جديدة
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main">
        <!-- Stats -->
        <div class="stats-row" id="stats-row">
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fas fa-utensils"></i></div>
                <div><div class="stat-value" id="stat-total">0</div><div class="stat-label">إجمالي الأصناف</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon green"><i class="fas fa-check-circle"></i></div>
                <div><div class="stat-value" id="stat-available">0</div><div class="stat-label">الأصناف المتاحة</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon red"><i class="fas fa-times-circle"></i></div>
                <div><div class="stat-value" id="stat-unavailable">0</div><div class="stat-label">غير متاحة</div></div>
            </div>
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fas fa-tags"></i></div>
                <div><div class="stat-value" id="stat-categories">0</div><div class="stat-label">الفئات</div></div>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <div class="section-header" style="margin:0; border:none; padding:0; flex:1;">
                <div class="section-title" id="current-section-title">جميع الأصناف</div>
                <div class="section-badge" id="current-count-badge">0</div>
            </div>
            <div class="toolbar-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="بحث عن صنف..." id="search-input" oninput="applyFilters()">
                </div>
                <select class="filter-select" id="filter-availability" onchange="applyFilters()">
                    <option value="all">الكل</option>
                    <option value="available">متاح</option>
                    <option value="unavailable">غير متاح</option>
                </select>
                <div class="view-btns">
                    <button class="view-btn active" id="view-grid" onclick="setView('grid')" title="عرض بطاقات"><i class="fas fa-th-large"></i></button>
                    <button class="view-btn" id="view-table" onclick="setView('table')" title="عرض جدول"><i class="fas fa-list"></i></button>
                </div>
            </div>
        </div>

        <!-- Items Container -->
        <div id="items-container"></div>
    </div>
</div>

<!-- ===== ADD/EDIT MODAL ===== -->
<div class="modal-overlay" id="item-modal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="modal-title">
                <i class="fas fa-plus-circle"></i> إضافة صنف جديد
            </div>
            <button class="modal-close" onclick="closeModal('item-modal')"><i class="fas fa-times"></i></button>
        </div>

        <div class="form-group">
            <label class="form-label">اسم الصنف <span>*</span></label>
            <input type="text" class="form-control" id="item-name" placeholder="مثال: مجبوس لحم عربي">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">الفئة <span>*</span></label>
                <select class="form-control" id="item-category">
                    <option value="">اختر الفئة</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">فئة جديدة</label>
                <input type="text" class="form-control" id="item-new-category" placeholder="أو أدخل فئة جديدة">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">السعر (KD) <span>*</span></label>
            <input type="number" class="form-control" id="item-price" placeholder="0.000" step="0.001" min="0">
            <div class="form-hint">أدخل السعر بالدينار الكويتي (مثال: 6.500)</div>
        </div>

        <div class="form-group" id="availability-group" style="display:none">
            <label class="form-label">حالة التوفر</label>
            <div style="display:flex; align-items:center; gap:12px; margin-top:5px;">
                <label class="avail-toggle">
                    <input type="checkbox" id="item-available" checked>
                    <span class="avail-slider"></span>
                </label>
                <span id="avail-label" style="font-size:0.9rem; color:var(--success)">متاح</span>
            </div>
        </div>

        <div class="form-actions">
            <button class="btn btn-outline" onclick="closeModal('item-modal')">إلغاء</button>
            <button class="btn btn-primary" id="save-btn" onclick="saveItem()">
                <i class="fas fa-save"></i> حفظ الصنف
            </button>
        </div>
    </div>
</div>

<!-- ===== CATEGORY MODAL ===== -->
<div class="modal-overlay" id="category-modal">
    <div class="modal" style="max-width:380px">
        <div class="modal-header">
            <div class="modal-title"><i class="fas fa-folder-plus"></i> إضافة فئة جديدة</div>
            <button class="modal-close" onclick="closeModal('category-modal')"><i class="fas fa-times"></i></button>
        </div>
        <div class="form-group">
            <label class="form-label">اسم الفئة <span>*</span></label>
            <input type="text" class="form-control" id="new-category-name" placeholder="مثال: السلطات">
        </div>
        <div class="form-actions">
            <button class="btn btn-outline" onclick="closeModal('category-modal')">إلغاء</button>
            <button class="btn btn-success" onclick="saveCategory()">
                <i class="fas fa-check"></i> إضافة الفئة
            </button>
        </div>
    </div>
</div>

<!-- ===== BULK IMPORT MODAL ===== -->
<div class="modal-overlay" id="import-modal">
    <div class="modal" style="max-width:560px">
        <div class="modal-header">
            <div class="modal-title"><i class="fas fa-file-import"></i> استيراد بيانات المنيو</div>
            <button class="modal-close" onclick="closeModal('import-modal')"><i class="fas fa-times"></i></button>
        </div>
        <p style="color:var(--muted); font-size:0.88rem; margin-bottom:16px;">
            الصق بيانات المنيو بتنسيق CSV: <code style="background:#1a1a1a; padding:2px 6px; border-radius:4px;">id,name,category,price</code>
        </p>
        <div class="form-group">
            <textarea class="form-control" id="import-data" rows="10"
                placeholder="1,مجبوس لحم (عربي),اللحم العربي,6.000&#10;2,مقلوبة لحم (عربي),اللحم العربي,6.000"></textarea>
        </div>
        <div class="form-actions">
            <button class="btn btn-outline" onclick="closeModal('import-modal')">إلغاء</button>
            <button class="btn btn-primary" onclick="importData()">
                <i class="fas fa-upload"></i> استيراد
            </button>
        </div>
    </div>
</div>

<script>
// ============================
// CONFIG - ضع هنا رابط السيرفر
// ============================
const MENU_API_URL = 'https://script.google.com/macros/s/AKfycbw_-ElaqxlIaBvR8NNgz6wnGnuVtbz1P4uPf0S1Zj4ATl1SNpZfClkwoRmzEbyPaH8u/exec';

// ============================
// STATE
// ============================
let allItems     = [];
let currentCat   = 'all';
let currentView  = 'grid';
let editingId    = null;
let categories   = [];

// ============================
// INIT
// ============================
document.addEventListener('DOMContentLoaded', () => {
    loadMenu();

    document.getElementById('item-available').addEventListener('change', function() {
        document.getElementById('avail-label').textContent = this.checked ? 'متاح' : 'غير متاح';
        document.getElementById('avail-label').style.color = this.checked ? 'var(--success)' : 'var(--danger)';
    });
});

// ============================
// API CALLS
// ============================
async function apiGet(params = {}) {
    const url = new URL(MENU_API_URL);
    Object.entries(params).forEach(([k,v]) => url.searchParams.append(k, v));
    const res = await fetch(url.toString());
    return res.json();
}

async function apiPost(params = {}) {
    const body = new URLSearchParams(params);
    const res = await fetch(MENU_API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body
    });
    return res.json();
}

// ============================
// LOAD MENU
// ============================
async function loadMenu() {
    showLoading(true);
    try {
        const data = await apiGet({ action: 'getMenu' });
        if (data.result === 'success') {
            allItems = [];
            categories = Object.keys(data.menu);
            categories.forEach(cat => {
                data.menu[cat].forEach(item => {
                    allItems.push({ ...item, category: cat });
                });
            });
            updateStats();
            buildSidebar();
            applyFilters();
            toast('تم تحميل المنيو بنجاح', 'success');
        } else {
            toast('خطأ: ' + (data.message || 'فشل التحميل'), 'error');
        }
    } catch(e) {
        toast('فشل الاتصال بالسيرفر. تأكد من الرابط.', 'error');
        console.error(e);
    }
    showLoading(false);
}

// ============================
// STATS
// ============================
function updateStats() {
    const total      = allItems.length;
    const available  = allItems.filter(i => i.available).length;
    const unavail    = total - available;
    const cats       = new Set(allItems.map(i => i.category)).size;

    document.getElementById('stat-total').textContent      = total;
    document.getElementById('stat-available').textContent  = available;
    document.getElementById('stat-unavailable').textContent = unavail;
    document.getElementById('stat-categories').textContent = cats;
    document.getElementById('count-all').textContent       = total;
}

// ============================
// SIDEBAR
// ============================
function buildSidebar() {
    const container = document.getElementById('sidebar-cats');
    const allBtn = container.querySelector('#cat-all');

    // Remove old category buttons
    Array.from(container.children).forEach(el => {
        if (el.id !== 'cat-all') el.remove();
    });

    categories.forEach(cat => {
        const count = allItems.filter(i => i.category === cat).length;
        const div = document.createElement('div');
        div.className = 'cat-item' + (currentCat === cat ? ' active' : '');
        div.id = 'cat-' + cat;
        div.innerHTML = `
            <span><i class="fas fa-circle" style="font-size:0.5rem; margin-left:8px; color:var(--primary)"></i>${cat}</span>
            <span class="cat-count">${count}</span>`;
        div.onclick = () => filterCategory(cat);
        container.insertBefore(div, container.querySelector('.sidebar-actions') || null);
    });

    document.getElementById('count-all').textContent = allItems.length;
}

// ============================
// FILTER & RENDER
// ============================
function filterCategory(cat) {
    currentCat = cat;
    document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
    const target = document.getElementById('cat-' + cat) || document.getElementById('cat-all');
    if (target) target.classList.add('active');

    const title = cat === 'all' ? 'جميع الأصناف' : cat;
    document.getElementById('current-section-title').textContent = title;
    applyFilters();
}

function applyFilters() {
    const search    = document.getElementById('search-input').value.trim().toLowerCase();
    const availFilt = document.getElementById('filter-availability').value;

    let filtered = allItems.filter(item => {
        const catMatch   = currentCat === 'all' || item.category === currentCat;
        const nameMatch  = !search || item.name.toLowerCase().includes(search);
        const availMatch = availFilt === 'all'
            || (availFilt === 'available'   &&  item.available)
            || (availFilt === 'unavailable' && !item.available);
        return catMatch && nameMatch && availMatch;
    });

    document.getElementById('current-count-badge').textContent = filtered.length;
    renderItems(filtered);
}

// ============================
// RENDER
// ============================
function renderItems(items) {
    const container = document.getElementById('items-container');

    if (items.length === 0) {
        container.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-search"></i>
                <p>لا توجد أصناف مطابقة للبحث</p>
                <button class="btn btn-primary" onclick="openAddModal()"><i class="fas fa-plus"></i> إضافة صنف</button>
            </div>`;
        return;
    }

    if (currentView === 'grid') {
        renderGrid(items);
    } else {
        renderTable(items);
    }
}

function renderGrid(items) {
    const container = document.getElementById('items-container');

    if (currentCat === 'all') {
        // Group by category
        const grouped = {};
        items.forEach(item => {
            if (!grouped[item.category]) grouped[item.category] = [];
            grouped[item.category].push(item);
        });

        container.innerHTML = '';
        Object.entries(grouped).forEach(([cat, catItems]) => {
            const section = document.createElement('div');
            section.className = 'cat-section';
            section.innerHTML = `
                <div class="cat-section-header" onclick="toggleSection(this)">
                    <div class="cat-section-title">
                        <i class="fas fa-chevron-down" style="font-size:0.8rem; color:var(--primary)"></i>
                        ${cat}
                        <span style="background:rgba(255,102,0,0.15); color:var(--primary); padding:2px 10px; border-radius:20px; font-size:0.78rem;">${catItems.length} صنف</span>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-primary btn-sm" onclick="event.stopPropagation(); openAddModal('${cat}')">
                            <i class="fas fa-plus"></i> إضافة
                        </button>
                        <button class="btn btn-outline btn-sm" onclick="event.stopPropagation(); confirmDeleteCategory('${cat}')">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                <div class="cat-section-body open">
                    <div class="items-grid">${catItems.map(itemCard).join('')}</div>
                </div>`;
            container.appendChild(section);
        });
    } else {
        container.innerHTML = `<div class="items-grid">${items.map(itemCard).join('')}</div>`;
    }
}

function itemCard(item) {
    return `
        <div class="item-card ${item.available ? '' : 'unavailable'}" id="card-${item.id}">
            <div class="item-header">
                <div class="item-name">${item.name}</div>
                <label class="avail-toggle" title="${item.available ? 'متاح - اضغط لإيقاف' : 'غير متاح - اضغط لتفعيل'}">
                    <input type="checkbox" ${item.available ? 'checked' : ''} onchange="toggleAvailability(${item.id}, this)">
                    <span class="avail-slider"></span>
                </label>
            </div>
            <div style="margin-bottom:10px;">
                <span class="item-category-tag"><i class="fas fa-tag" style="font-size:0.65rem;"></i> ${item.category}</span>
            </div>
            <div class="item-price">${parseFloat(item.price).toFixed(3)} KD</div>
            <div class="item-actions">
                <button class="btn btn-info btn-sm" onclick="openEditModal(${item.id})">
                    <i class="fas fa-edit"></i> تعديل
                </button>
                <button class="btn btn-danger btn-sm btn-icon" onclick="confirmDelete(${item.id}, '${item.name.replace(/'/g, "\\'")}')">
                    <i class="fas fa-trash"></i>
                </button>
                <button class="btn btn-outline btn-sm btn-icon" onclick="duplicateItem(${item.id})" title="نسخ الصنف">
                    <i class="fas fa-copy"></i>
                </button>
            </div>
        </div>`;
}

function renderTable(items) {
    const container = document.getElementById('items-container');
    container.innerHTML = `
        <div style="background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden;">
            <table class="items-table">
                <thead>
                    <tr>
                        <th style="width:50px">#</th>
                        <th>اسم الصنف</th>
                        <th>الفئة</th>
                        <th>السعر</th>
                        <th style="width:90px; text-align:center">التوفر</th>
                        <th style="width:140px; text-align:center">إجراءات</th>
                    </tr>
                </thead>
                <tbody>
                    ${items.map(item => `
                        <tr id="row-${item.id}">
                            <td style="color:var(--muted)">${item.id}</td>
                            <td class="name-cell">${item.name}</td>
                            <td><span class="item-category-tag">${item.category}</span></td>
                            <td class="price-cell">${parseFloat(item.price).toFixed(3)} KD</td>
                            <td style="text-align:center">
                                <label class="avail-toggle">
                                    <input type="checkbox" ${item.available ? 'checked' : ''} onchange="toggleAvailability(${item.id}, this)">
                                    <span class="avail-slider"></span>
                                </label>
                            </td>
                            <td style="text-align:center">
                                <div style="display:flex; gap:6px; justify-content:center;">
                                    <button class="btn btn-info btn-sm btn-icon" onclick="openEditModal(${item.id})" title="تعديل"><i class="fas fa-edit"></i></button>
                                    <button class="btn btn-danger btn-sm btn-icon" onclick="confirmDelete(${item.id}, '${item.name.replace(/'/g, "\\'")}')"><i class="fas fa-trash"></i></button>
                                    <button class="btn btn-outline btn-sm btn-icon" onclick="duplicateItem(${item.id})" title="نسخ"><i class="fas fa-copy"></i></button>
                                </div>
                            </td>
                        </tr>`).join('')}
                </tbody>
            </table>
        </div>`;
}

function toggleSection(header) {
    const body = header.nextElementSibling;
    const icon = header.querySelector('.fa-chevron-down, .fa-chevron-up');
    body.classList.toggle('open');
    if (icon) {
        icon.classList.toggle('fa-chevron-down');
        icon.classList.toggle('fa-chevron-up');
    }
}

// ============================
// VIEW TOGGLE
// ============================
function setView(v) {
    currentView = v;
    document.getElementById('view-grid').classList.toggle('active',  v === 'grid');
    document.getElementById('view-table').classList.toggle('active', v === 'table');
    applyFilters();
}

// ============================
// ADD / EDIT MODAL
// ============================
function openAddModal(prefillCategory = null) {
    editingId = null;
    document.getElementById('modal-title').innerHTML = '<i class="fas fa-plus-circle"></i> إضافة صنف جديد';
    document.getElementById('save-btn').innerHTML    = '<i class="fas fa-save"></i> حفظ الصنف';
    document.getElementById('availability-group').style.display = 'none';

    document.getElementById('item-name').value          = '';
    document.getElementById('item-price').value         = '';
    document.getElementById('item-new-category').value  = '';
    document.getElementById('item-available').checked   = true;

    populateCategorySelect(prefillCategory);
    openModal('item-modal');
    setTimeout(() => document.getElementById('item-name').focus(), 200);
}

function openEditModal(id) {
    const item = allItems.find(i => i.id == id);
    if (!item) return;

    editingId = id;
    document.getElementById('modal-title').innerHTML = '<i class="fas fa-edit"></i> تعديل الصنف';
    document.getElementById('save-btn').innerHTML    = '<i class="fas fa-save"></i> حفظ التعديلات';
    document.getElementById('availability-group').style.display = 'block';

    document.getElementById('item-name').value         = item.name;
    document.getElementById('item-price').value        = item.price;
    document.getElementById('item-new-category').value = '';
    document.getElementById('item-available').checked  = item.available;

    const label = document.getElementById('avail-label');
    label.textContent = item.available ? 'متاح' : 'غير متاح';
    label.style.color = item.available ? 'var(--success)' : 'var(--danger)';

    populateCategorySelect(item.category);
    openModal('item-modal');
}

function populateCategorySelect(selected = null) {
    const sel = document.getElementById('item-category');
    sel.innerHTML = '<option value="">اختر الفئة</option>';
    categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        if (cat === selected) opt.selected = true;
        sel.appendChild(opt);
    });
}

async function saveItem() {
    const name        = document.getElementById('item-name').value.trim();
    const price       = document.getElementById('item-price').value;
    const catSelect   = document.getElementById('item-category').value;
    const catNew      = document.getElementById('item-new-category').value.trim();
    const available   = document.getElementById('item-available').checked;
    const category    = catNew || catSelect;

    if (!name)     { highlight('item-name');     toast('أدخل اسم الصنف', 'error'); return; }
    if (!category) { highlight('item-category'); toast('اختر أو أدخل الفئة', 'error'); return; }
    if (!price)    { highlight('item-price');    toast('أدخل السعر', 'error'); return; }

    showLoading(true);
    try {
        let result;
        if (editingId) {
            result = await apiPost({ action:'updateItem', id:editingId, name, category, price, available });
        } else {
            result = await apiPost({ action:'addItem', name, category, price });
        }

        if (result.result === 'success') {
            toast(editingId ? 'تم تحديث الصنف بنجاح ✅' : 'تم إضافة الصنف بنجاح ✅', 'success');
            closeModal('item-modal');
            await loadMenu();
        } else {
            toast('خطأ: ' + (result.message || 'فشل الحفظ'), 'error');
        }
    } catch(e) {
        toast('فشل الاتصال بالسيرفر', 'error');
    }
    showLoading(false);
}

// ============================
// DELETE
// ============================
function confirmDelete(id, name) {
    Swal.fire({
        title: 'حذف الصنف',
        html: `هل أنت متأكد من حذف <strong>${name}</strong>؟<br><small style="color:#888">لا يمكن التراجع عن هذا الإجراء</small>`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff4444',
        cancelButtonColor: '#333',
        confirmButtonText: '<i class="fas fa-trash"></i> نعم، احذف',
        cancelButtonText: 'إلغاء',
        background: '#1e1e1e',
        color: '#fff'
    }).then(async result => {
        if (result.isConfirmed) {
            showLoading(true);
            try {
                const res = await apiPost({ action: 'deleteItem', id });
                if (res.result === 'success') {
                    toast('تم حذف الصنف بنجاح', 'success');
                    await loadMenu();
                } else {
                    toast('خطأ: ' + res.message, 'error');
                }
            } catch(e) { toast('فشل الاتصال', 'error'); }
            showLoading(false);
        }
    });
}

function confirmDeleteCategory(catName) {
    const count = allItems.filter(i => i.category === catName).length;
    Swal.fire({
        title: 'حذف الفئة',
        html: `هل تريد حذف فئة <strong>${catName}</strong>؟<br>سيتم حذف <strong style="color:#ff4444">${count} صنف</strong> معها.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff4444',
        cancelButtonColor: '#333',
        confirmButtonText: 'نعم، احذف الفئة',
        cancelButtonText: 'إلغاء',
        background: '#1e1e1e',
        color: '#fff'
    }).then(async result => {
        if (result.isConfirmed) {
            showLoading(true);
            try {
                const res = await apiPost({ action: 'deleteCategory', name: catName });
                if (res.result === 'success') {
                    toast(`تم حذف الفئة و ${res.deleted} صنف`, 'success');
                    if (currentCat === catName) filterCategory('all');
                    await loadMenu();
                } else {
                    toast('خطأ: ' + res.message, 'error');
                }
            } catch(e) { toast('فشل الاتصال', 'error'); }
            showLoading(false);
        }
    });
}

// ============================
// TOGGLE AVAILABILITY
// ============================
async function toggleAvailability(id, checkbox) {
    const item = allItems.find(i => i.id == id);
    const newState = checkbox.checked;

    try {
        const res = await apiPost({ action: 'toggleAvailability', id });
        if (res.result === 'success') {
            if (item) item.available = res.available;
            const card = document.getElementById('card-' + id);
            if (card) card.classList.toggle('unavailable', !res.available);
            toast(res.available ? 'تم تفعيل الصنف ✅' : 'تم إيقاف الصنف ⛔', res.available ? 'success' : 'info');
            updateStats();
        } else {
            checkbox.checked = !newState;
            toast('فشل التحديث', 'error');
        }
    } catch(e) {
        checkbox.checked = !newState;
        toast('فشل الاتصال', 'error');
    }
}

// ============================
// DUPLICATE
// ============================
async function duplicateItem(id) {
    const item = allItems.find(i => i.id == id);
    if (!item) return;
    showLoading(true);
    try {
        const res = await apiPost({
            action: 'addItem',
            name: item.name + ' (نسخة)',
            category: item.category,
            price: item.price
        });
        if (res.result === 'success') {
            toast('تم نسخ الصنف ✅', 'success');
            await loadMenu();
        } else {
            toast('فشل النسخ', 'error');
        }
    } catch(e) { toast('فشل الاتصال', 'error'); }
    showLoading(false);
}

// ============================
// CATEGORY MODAL
// ============================
function openCategoryModal() {
    document.getElementById('new-category-name').value = '';
    openModal('category-modal');
    setTimeout(() => document.getElementById('new-category-name').focus(), 200);
}

async function saveCategory() {
    const name = document.getElementById('new-category-name').value.trim();
    if (!name) { toast('أدخل اسم الفئة', 'error'); return; }
    if (categories.includes(name)) { toast('الفئة موجودة مسبقاً', 'error'); return; }

    showLoading(true);
    try {
        const res = await apiPost({ action: 'addCategory', name });
        if (res.result === 'success') {
            toast('تم إضافة الفئة ✅', 'success');
            closeModal('category-modal');
            await loadMenu();
        } else {
            toast('خطأ: ' + res.message, 'error');
        }
    } catch(e) { toast('فشل الاتصال', 'error'); }
    showLoading(false);
}

// ============================
// IMPORT
// ============================
async function importData() {
    const raw = document.getElementById('import-data').value.trim();
    if (!raw) { toast('أدخل البيانات أولاً', 'error'); return; }

    const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
    showLoading(true);
    let added = 0, failed = 0;

    for (const line of lines) {
        const parts = line.split(',').map(p => p.trim());
        if (parts.length < 3) { failed++; continue; }
        const [id, name, category, price] = parts;
        try {
            const res = await apiPost({ action: 'addItem', name, category, price: price || '0' });
            if (res.result === 'success') added++;
            else failed++;
        } catch { failed++; }
    }

    showLoading(false);
    closeModal('import-modal');
    toast(`تم استيراد ${added} صنف ${failed > 0 ? '(فشل '+failed+')' : ''}`, added > 0 ? 'success' : 'error');
    if (added > 0) await loadMenu();
}

// ============================
// MODAL HELPERS
// ============================
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }

document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
        if (e.target === overlay) overlay.classList.remove('show');
    });
});

// ============================
// TOAST
// ============================
function toast(message, type = 'info') {
    const icons = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
    const colors = { success: 'var(--success)', error: 'var(--danger)', info: 'var(--info)', warning: 'var(--warning)' };
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.innerHTML = `<i class="fas ${icons[type]||icons.info}" style="color:${colors[type]}"></i><span>${message}</span>`;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => {
        el.style.opacity = '0';
        el.style.transform = 'translateX(-20px)';
        el.style.transition = '0.3s';
        setTimeout(() => el.remove(), 300);
    }, 3000);
}

// ============================
// LOADING
// ============================
function showLoading(show) {
    document.getElementById('loading').classList.toggle('show', show);
}

// ============================
// HIGHLIGHT ERROR
// ============================
function highlight(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('error');
    el.focus();
    setTimeout(() => el.classList.remove('error'), 2000);
}

// ============================
// KEYBOARD SHORTCUTS
// ============================
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.show').forEach(m => m.classList.remove('show'));
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        const modal = document.querySelector('.modal-overlay.show');
        if (modal?.id === 'item-modal') saveItem();
    }
});
</script>
</body>
</html>
